name: 🕛 Daily Price Update

on:
  schedule:
    - cron: "0 0 * * *"      # every day at 00:00 UTC
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write              # needed to commit database.db back to repo

jobs:
  update:
    name: Fetch & store prices
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo (with full history for git push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Run price updater (all products)
        env:
          ALERT_EMAIL_FROM:     ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:       ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_SMTP_PASSWORD:  ${{ secrets.ALERT_SMTP_PASSWORD }}
          ALERT_WEBHOOK_URL:    ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python update_price.py --all

      - name: 💾 Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.db
          git diff --cached --quiet || \
            git commit -m "chore: update price data [$(date -u +%Y-%m-%d)]"
          git push

      - name: 📢 Notify on failure
        if: failure()
        run: |
          echo "::error::Price update workflow failed — check logs above."
